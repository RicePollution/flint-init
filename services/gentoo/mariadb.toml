# Gentoo dev-db/mariadb; mysqld path varies by slot — adjust if using non-default slot
[service]
name = "mariadb"
exec = "/usr/bin/mysqld --user=mysql --datadir=/var/lib/mysql"
restart = "on-failure"

[deps]
after = ["udev-trigger"]

[ready]
strategy = "socket"
path = "/run/mysqld/mysqld.sock"

[resources]
oom_score_adj = -500
