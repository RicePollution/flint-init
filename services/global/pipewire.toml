# System-mode PipeWire for embedded/kiosk setups; desktop installs run this as a user service
[service]
name = "pipewire"
exec = "/usr/bin/pipewire"
# user = "your-username"  # desktop service: set to your login user
restart = "never"

[deps]
needs = ["dbus"]
after = ["udev-trigger"]

[ready]
strategy = "socket"
path = "/run/pipewire-0"
