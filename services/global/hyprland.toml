[service]
name = "hyprland"
exec = "env WLR_RENDERER=pixman WLR_NO_HARDWARE_CURSORS=1 /usr/bin/hyprland"
# user = "your-username"  # desktop service: set to your login user
restart = "never"

[deps]
needs = ["dbus", "polkit"]
after = ["udev-trigger", "pipewire"]

[ready]
strategy = "socket"
path = "/run/user/1000/hypr"
